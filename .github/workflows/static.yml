name: Deploy documentation
on:
    workflow_dispatch:
permissions:
    contents: read
    pages: write
    id-token: write
concurrency:
    group: "pages"
    cancel-in-progress: true
jobs:
    deploy:
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v6
            - name: Install Typst
              run: sudo snap install typst
            - name: Build site
              run: |
                  mkdir -p docs/next
                  typst compile docs/main.typ docs/next/index.html --format html --features html --root .
                  cp docs/v0.5.html docs/index.html
            - name: Setup Pages
              uses: actions/configure-pages@v5
            - name: Upload artifact
              uses: actions/upload-pages-artifact@v3
              with:
                  path: "./docs"
            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v4
